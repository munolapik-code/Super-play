<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Play - Список игр</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121416; /* Красивый глубокий темный фон */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #FFFFFF;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- 1. ГЛАВНЫЙ ЭКРАН (СПИСОК ИГР) --- */
        #lobby-screen {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding: 20px;
            overflow-y: auto;
        }

        /* Верхняя панель */
        .lobby-header {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-bottom: 30px;
            border-bottom: 2px solid #232527;
            padding-bottom: 15px;
        }
        .lobby-header span {
            color: #0084FF;
        }

        /* Сетка для карточек игр */
        .games-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: flex-start;
        }

        /* Карточка одной игры */
        .game-card {
            background-color: #1C1E22;
            border: 1px solid #2D3035;
            border-radius: 16px;
            width: 260px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s, border-color 0.2s;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: #0084FF;
        }

        /* Картинка-превью внутри карточки */
        .game-preview {
            height: 150px;
            background: linear-gradient(135deg, #FF5733 0%, #900C3F 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Маленький декоративный кубик на превью */
        .preview-cube {
            width: 45px;
            height: 45px;
            background-color: #FFFFFF;
            border-radius: 8px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        /* Инфо внутри карточки */
        .game-info {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex-grow: 1;
        }

        .game-title {
            font-size: 18px;
            font-weight: 700;
            margin: 0;
            color: #F5F5F5;
        }

        /* Кнопка Играть внизу карточки */
        .play-btn {
            background-color: #0084FF;
            color: #FFFFFF;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.15s;
            text-align: center;
            width: 100%;
        }

        .play-btn:hover {
            background-color: #006ED5;
        }

        /* --- 2. ЭКРАН ИГРЫ --- */
        #game-screen {
            display: none; /* Изначально скрыт */
            width: 100%;
            height: 100%;
            position: relative;
        }

        canvas {
            display: block;
            background-color: #87CEEB; /* Небо */
            width: 100%;
            height: 100%;
        }

        /* Кнопка-дверька для выхода в углу экрана */
        .exit-door-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background-color: rgba(28, 30, 34, 0.85);
            border: 2px solid #2D3035;
            border-radius: 12px;
            color: #FF4A4A;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            font-size: 22px;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .exit-door-btn:hover {
            background-color: #1C1E22;
            transform: scale(1.05);
        }

        /* Кнопки управления для телефонов */
        #controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            z-index: 10;
            pointer-events: none;
        }
        .joystick-zone, .jump-btn {
            pointer-events: auto;
        }

        .joystick-zone {
            width: 110px;
            height: 110px;
            background: rgba(28, 30, 34, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            position: relative;
            touch-action: none;
        }
        .joystick-stick {
            width: 45px;
            height: 45px;
            background: #FFFFFF;
            border-radius: 50%;
            position: absolute;
            top: 30px;
            left: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .jump-btn {
            width: 85px;
            height: 85px;
            background: rgba(0, 132, 255, 0.7);
            border: 2px solid #FFFFFF;
            border-radius: 50%;
            color: white;
            font-weight: 800;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="lobby-screen">
        <div class="lobby-header">
            <span>Super</span> Play
        </div>

        <div class="games-grid">
            <div class="game-card">
                <div class="game-preview">
                    <div class="preview-cube"></div>
                </div>
                <div class="game-info">
                    <h3 class="game-title">Поиграй с кубиком</h3>
                    <button class="play-btn" id="startGameBtn">Играть</button>
                </div>
            </div>
            
            </div>
    </div>

    <div id="game-screen">
        <div class="exit-door-btn" id="exitDoorBtn" title="Выйти в меню">
            <i class="fa-solid fa-door-open"></i>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="controls">
            <div class="joystick-zone" id="joystickZone">
                <div class="joystick-stick" id="stick"></div>
            </div>
            <div class="jump-btn" id="jumpBtn">ПРЫЖОК</div>
        </div>
    </div>

    <script>
        const lobbyScreen = document.getElementById('lobby-screen');
        const gameScreen = document.getElementById('game-screen');
        const startGameBtn = document.getElementById('startGameBtn');
        const exitDoorBtn = document.getElementById('exitDoorBtn');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let gameActive = false;
        let loopId = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', () => {
            if (gameActive) resizeCanvas();
        });

        // Настройки физики, кубика и земли
        const gravity = 0.6;
        const player = {
            x: 150,
            y: 0,
            width: 45,
            height: 45,
            vx: 0,
            vy: 0,
            speed: 5.5,
            jumpForce: 13,
            grounded: false
        };

        let groundY = 0;

        function initLevel() {
            resizeCanvas();
            groundY = canvas.height - 120; // Высота земли под любой экран
            player.x = canvas.width / 2 - player.width / 2; // Спавн по центру экрана
            player.y = groundY - player.height;
            player.vx = 0;
            player.vy = 0;
        }

        // Управление кнопками клавиатуры (ПК)
        const keys = { left: false, right: false, jump: false };

        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.left = true;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = true;
            if (e.code === 'Space' || e.code === 'KeyW' || e.code === 'ArrowUp') keys.jump = true;
        });

        window.addEventListener('keyup', (e) => {
            if (!gameActive) return;
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.left = false;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = false;
            if (e.code === 'Space' || e.code === 'KeyW' || e.code === 'ArrowUp') keys.jump = false;
        });

        // Мобильный джойстик
        const joystickZone = document.getElementById('joystickZone');
        const stick = document.getElementById('stick');
        let joystickActive = false;
        let startX = 0;

        joystickZone.addEventListener('touchstart', (e) => {
            joystickActive = true;
            startX = e.touches[0].clientX;
        });

        joystickZone.addEventListener('touchmove', (e) => {
            if (!joystickActive) return;
            const diffX = e.touches[0].clientX - startX;
            let maxDist = 35;
            let moveX = Math.max(-maxDist, Math.min(maxDist, diffX));
            stick.style.transform = `translateX(${moveX}px)`;

            if (moveX > 8) { keys.right = true; keys.left = false; }
            else if (moveX < -8) { keys.left = true; keys.right = false; }
            else { keys.left = false; keys.right = false; }
        });

        joystickZone.addEventListener('touchend', () => {
            joystickActive = false;
            stick.style.transform = 'translateX(0px)';
            keys.left = false;
            keys.right = false;
        });

        // Кнопка Прыжок для мобильных
        const jumpBtn = document.getElementById('jumpBtn');
        jumpBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            keys.jump = true;
        });
        jumpBtn.addEventListener('touchend', () => { keys.jump = false; });


        // --- ОБНОВЛЕНИЕ И ОТРИСОВКА ---
        function update() {
            // Движение по горизонтали
            if (keys.left) player.vx = -player.speed;
            else if (keys.right) player.vx = player.speed;
            else player.vx = 0;

            // Гравитация и физика
            player.vy += gravity;
            player.x += player.vx;
            player.y += player.vy;

            // Ограничение движения по границам экрана экрана
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            // Столкновение с землей
            if (player.y + player.height >= groundY) {
                player.y = groundY - player.height;
                player.vy = 0;
                player.grounded = true;
            } else {
                player.grounded = false;
            }

            // Прыжок
            if (keys.jump && player.grounded) {
                player.vy = -player.jumpForce;
                player.grounded = false;
            }
        }

        function draw() {
            // Чистим экран
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Рисуем землю (зелёная трава)
            ctx.fillStyle = '#2ed573';
            ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);

            // Рисуем кубик (красивый оранжево-красный цвет)
            ctx.fillStyle = '#FF5733';
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Рисуем глазки кубику, чтобы смотрел в сторону движения
            ctx.fillStyle = '#FFFFFF';
            let eyeX = player.x + (player.vx >= 0 ? 30 : 5);
            ctx.fillRect(eyeX, player.y + 12, 10, 10);
            ctx.fillStyle = '#000000';
            let pupilX = player.x + (player.vx >= 0 ? 35 : 5);
            ctx.fillRect(pupilX, player.y + 14, 5, 5);
        }

        function gameLoop() {
            if (!gameActive) return;
            update();
            draw();
            loopId = requestAnimationFrame(gameLoop);
        }

        // --- КНОПКИ ПЕРЕКЛЮЧЕНИЯ ЭКРАНОВ ---
        startGameBtn.addEventListener('click', () => {
            lobbyScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            gameActive = true;
            initLevel();
            gameLoop();
        });

        exitDoorBtn.addEventListener('click', () => {
            gameActive = false;
            cancelAnimationFrame(loopId);
            gameScreen.style.display = 'none';
            lobbyScreen.style.display = 'flex';
            // Сброс управления при выходе
            keys.left = false; keys.right = false; keys.jump = false;
        });
    </script>
</body>
</html>
