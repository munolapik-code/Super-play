<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Play - Список игр</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121416;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #FFFFFF;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- 1. ГЛАВНЫЙ ЭКРАН (СПИСОК ИГР) --- */
        #lobby-screen {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding: 20px;
            overflow-y: auto;
        }

        .lobby-header {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-bottom: 30px;
            border-bottom: 2px solid #232527;
            padding-bottom: 15px;
        }
        .lobby-header span {
            color: #0084FF;
        }

        .games-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: flex-start;
        }

        .game-card {
            background-color: #1C1E22;
            border: 1px solid #2D3035;
            border-radius: 16px;
            width: 260px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s, border-color 0.2s;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: #0084FF;
        }

        .game-preview {
            height: 150px;
            background: linear-gradient(135deg, #FF5733 0%, #900C3F 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .game-preview.prison {
            background: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
        }

        .preview-cube {
            width: 45px;
            height: 45px;
            background-color: #FFFFFF;
            border-radius: 8px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .preview-bars {
            font-size: 50px;
            color: rgba(255, 255, 255, 0.2);
        }

        .game-info {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex-grow: 1;
        }

        .game-title {
            font-size: 18px;
            font-weight: 700;
            margin: 0;
            color: #F5F5F5;
        }

        .play-btn {
            background-color: #0084FF;
            color: #FFFFFF;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.15s;
            text-align: center;
            width: 100%;
        }

        .play-btn:hover {
            background-color: #006ED5;
        }

        /* --- 2. ЭКРАН ИГРЫ --- */
        #game-screen {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .exit-door-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background-color: rgba(28, 30, 34, 0.85);
            border: 2px solid #2D3035;
            border-radius: 12px;
            color: #FF4A4A;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            font-size: 22px;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .exit-door-btn:hover {
            background-color: #1C1E22;
            transform: scale(1.05);
        }

        #controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            z-index: 10;
            pointer-events: none;
        }
        .joystick-zone, .jump-btn {
            pointer-events: auto;
        }

        .joystick-zone {
            width: 110px;
            height: 110px;
            background: rgba(28, 30, 34, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            position: relative;
            touch-action: none;
        }
        .joystick-stick {
            width: 45px;
            height: 45px;
            background: #FFFFFF;
            border-radius: 50%;
            position: absolute;
            top: 30px;
            left: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .jump-btn {
            width: 85px;
            height: 85px;
            background: rgba(0, 132, 255, 0.7);
            border: 2px solid #FFFFFF;
            border-radius: 50%;
            color: white;
            font-weight: 800;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <!-- 1. ЭКРАН ЛОББИ -->
    <div id="lobby-screen">
        <div class="lobby-header">
            <span>Super</span> Play
        </div>

        <div class="games-grid">
            <!-- Первая игра -->
            <div class="game-card">
                <div class="game-preview">
                    <div class="preview-cube"></div>
                </div>
                <div class="game-info">
                    <h3 class="game-title">Поиграй с кубиком</h3>
                    <button class="play-btn" id="startGameBtn">Играть</button>
                </div>
            </div>
            
            <!-- Вторая игра: Побег из тюрьмы -->
            <div class="game-card">
                <div class="game-preview prison">
                    <i class="fa-solid fa-bars preview-bars"></i>
                </div>
                <div class="game-info">
                    <h3 class="game-title">Побег из тюрьмы</h3>
                    <button class="play-btn" id="startPrisonBtn">Играть</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. ИГРОВОЙ ЭКРАН -->
    <div id="game-screen">
        <div class="exit-door-btn" id="exitDoorBtn" title="Выйти в меню">
            <i class="fa-solid fa-door-open"></i>
        </div>

        <div id="canvas-container" style="width:100%; height:100%;"></div>

        <div id="controls">
            <div class="joystick-zone" id="joystickZone">
                <div class="joystick-stick" id="stick"></div>
            </div>
            <div class="jump-btn" id="jumpBtn">ПРЫЖОК</div>
        </div>
    </div>

    <script>
        const lobbyScreen = document.getElementById('lobby-screen');
        const gameScreen = document.getElementById('game-screen');
        const startGameBtn = document.getElementById('startGameBtn');
        const startPrisonBtn = document.getElementById('startPrisonBtn');
        const exitDoorBtn = document.getElementById('exitDoorBtn');
        const canvasContainer = document.getElementById('canvas-container');

        let currentGameMode = ''; 
        let gameActive = false;
        let loopId = null;

        // Элементы управления
        const joystickZone = document.getElementById('joystickZone');
        const stick = document.getElementById('stick');
        const jumpBtn = document.getElementById('jumpBtn');

        const keys = { left: false, right: false, forward: false, backward: false, jump: false };
        let joystickActive = false;
        let startX = 0;
        let startY = 0;
        let touchMoveX = 0;
        let touchMoveZ = 0;

        // Переменные Roblox-поворота головы (в радианах)
        let cameraYaw = 0;   
        let cameraPitch = 0; 
        let isRotating = false;
        let previousMouseX = 0;
        let previousMouseY = 0;

        // Изменение размеров экрана
        function handleResize() {
            if (!gameActive) return;
            if (currentGameMode === 'cube' && canvas2D) {
                canvas2D.width = window.innerWidth;
                canvas2D.height = window.innerHeight;
                groundY = canvas2D.height - 120;
            } else if (currentGameMode === 'prison' && camera3D && renderer3D) {
                camera3D.aspect = window.innerWidth / window.innerHeight;
                camera3D.updateProjectionMatrix();
                renderer3D.setSize(window.innerWidth, window.innerHeight);
            }
        }
        window.addEventListener('resize', handleResize);

        // ==========================================
        // ИГРА 1: 2D КУБИК
        // ==========================================
        let canvas2D = null;
        let ctx2D = null;
        const gravity2D = 0.6;
        const player2D = {
            x: 150, y: 0, width: 45, height: 45,
            vx: 0, vy: 0, speed: 5.5, jumpForce: 13, grounded: false
        };
        let groundY = 0;

        function initCubeGame() {
            canvasContainer.innerHTML = '<canvas id="gameCanvas"></canvas>';
            canvas2D = document.getElementById('gameCanvas');
            ctx2D = canvas2D.getContext('2d');
            
            canvas2D.width = window.innerWidth;
            canvas2D.height = window.innerHeight;
            groundY = canvas2D.height - 120;
            player2D.x = canvas2D.width / 2 - player2D.width / 2;
            player2D.y = groundY - player2D.height;
            player2D.vx = 0;
            player2D.vy = 0;
        }

        function updateCubeGame() {
            if (keys.left) player2D.vx = -player2D.speed;
            else if (keys.right) player2D.vx = player2D.speed;
            else player2D.vx = 0;

            player2D.vy += gravity2D;
            player2D.x += player2D.vx;
            player2D.y += player2D.vy;

            if (player2D.x < 0) player2D.x = 0;
            if (player2D.x + player2D.width > canvas2D.width) player2D.x = canvas2D.width - player2D.width;

            if (player2D.y + player2D.height >= groundY) {
                player2D.y = groundY - player2D.height;
                player2D.vy = 0;
                player2D.grounded = true;
            } else {
                player2D.grounded = false;
            }

            if (keys.jump && player2D.grounded) {
                player2D.vy = -player2D.jumpForce;
                player2D.grounded = false;
            }
        }

        function drawCubeGame() {
            ctx2D.clearRect(0, 0, canvas2D.width, canvas2D.height);
            canvas2D.style.backgroundColor = '#87CEEB';

            ctx2D.fillStyle = '#2ed573';
            ctx2D.fillRect(0, groundY, canvas2D.width, canvas2D.height - groundY);

            ctx2D.fillStyle = '#FF5733';
            ctx2D.fillRect(player2D.x, player2D.y, player2D.width, player2D.height);

            ctx2D.fillStyle = '#FFFFFF';
            let eyeX = player2D.x + (player2D.vx >= 0 ? 30 : 5);
            ctx2D.fillRect(eyeX, player2D.y + 12, 10, 10);
            ctx2D.fillStyle = '#000000';
            let pupilX = player2D.x + (player2D.vx >= 0 ? 35 : 5);
            ctx2D.fillRect(pupilX, player2D.y + 14, 5, 5);
        }

        // ==========================================
        // ИГРА 2: 3D ТЮРЬМА (С ПОВОРОТОМ ГОЛОВЫ)
        // ==========================================
        let scene3D, camera3D, renderer3D;
        let platforms3D = [];
        const player3D = {
            pos: new THREE.Vector3(0, 2, 0),
            vel: new THREE.Vector3(0, 0, 0),
            speed: 0.12,
            isGrounded: false,
            jumpForce: 0.22
        };
        const gravity3D = 0.01;

        function initPrisonGame() {
            canvasContainer.innerHTML = ''; 
            
            scene3D = new THREE.Scene();
            scene3D.background = new THREE.Color(0x1a1c1e); 
            scene3D.fog = new THREE.FogExp2(0x1a1c1e, 0.02);

            camera3D = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer3D = new THREE.WebGLRenderer({ antialias: true });
            renderer3D.setSize(window.innerWidth, window.innerHeight);
            canvasContainer.appendChild(renderer3D.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.3);
            scene3D.add(ambient);
            const dirLight = new THREE.DirectionalLight(0x7ea2ff, 0.7); 
            dirLight.position.set(10, 30, 10);
            scene3D.add(dirLight);

            // Сброс позиции и углов поворота головы
            player3D.pos.set(0, 2, 0);
            player3D.vel.set(0, 0, 0);
            cameraYaw = 0;
            cameraPitch = 0;
            camera3D.position.copy(player3D.pos);

            platforms3D = [];
            const mat = new THREE.MeshStandardMaterial({ color: 0x4b535c, roughness: 0.8 }); 

            create3DPlatform(0, 0, 0, 5, 5, mat);

            let nextZ = -6;
            let nextX = 0;
            for (let i = 0; i < 30; i++) {
                nextX += (Math.random() - 0.5) * 4;
                let nextY = (Math.random() - 0.2) * 1.2; 
                create3DPlatform(nextX, nextY, nextZ, 2.5, 2.5, mat);
                nextZ -= 7;
            }
        }

        function create3DPlatform(x, y, z, w, l, material) {
            const geo = new THREE.BoxGeometry(w, 0.8, l);
            const mesh = new THREE.Mesh(geo, material);
            mesh.position.set(x, y, z);
            scene3D.add(mesh);
            
            platforms3D.push({
                minX: x - w/2, maxX: x + w/2,
                minY: y + 0.4,
                minZ: z - l/2, maxZ: z + l/2
            });
        }

        function updatePrisonGame() {
            let moveForward = 0;
            let moveRight = 0;

            if (keys.forward) moveForward = 1;
            if (keys.backward) moveForward = -1;
            if (keys.left) moveRight = -1;
            if (keys.right) moveRight = 1;

            // Управление мобильным джойстиком
            if (joystickActive) {
                moveRight = touchMoveX;
                moveForward = -touchMoveZ; 
            }

            // Вычисляем направление движения с учетом поворота головы (cameraYaw)
            const frontVector = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), cameraYaw);
            const rightVector = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), cameraYaw);

            player3D.pos.addScaledVector(frontVector, moveForward * player3D.speed);
            player3D.pos.addScaledVector(rightVector, moveRight * player3D.speed);

            // Физика и гравитация
            player3D.vel.y -= gravity3D;
            player3D.pos.y += player3D.vel.y;

            player3D.isGrounded = false;
            for (let i = 0; i < platforms3D.length; i++) {
                let p = platforms3D[i];
                if (player3D.pos.x >= p.minX && player3D.pos.x <= p.maxX &&
                    player3D.pos.z >= p.minZ && player3D.pos.z <= p.maxZ) {
                    
                    if (player3D.pos.y <= p.minY + 1.0 && player3D.pos.y >= p.minY - 0.2 && player3D.vel.y <= 0) {
                        player3D.pos.y = p.minY + 1.0;
                        player3D.vel.y = 0;
                        player3D.isGrounded = true;
                        break;
                    }
                }
            }

            if (player3D.pos.y < -15) {
                player3D.pos.set(0, 2, 0);
                player3D.vel.set(0, 0, 0);
            }

            // Привязка камеры к голове персонажа
            camera3D.position.copy(player3D.pos);

            // Куда именно мы смотрим (Вычисление направления взгляда)
            const target = new THREE.Vector3(0, 0, -1);
            target.applyAxisAngle(new THREE.Vector3(1, 0, 0), cameraPitch);
            target.applyAxisAngle(new THREE.Vector3(0, 1, 0), cameraYaw);
            target.add(player3D.pos);
            
            camera3D.lookAt(target);

            if (keys.jump && player3D.isGrounded) {
                player3D.vel.y = player3D.jumpForce;
                player3D.isGrounded = false;
            }
        }

        // ==========================================
        // ОБРАБОТЧИКИ ПК КЛАВИАТУРЫ
        // ==========================================
        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.left = true;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = true;
            if (e.code === 'Space') keys.jump = true;

            if (e.code === 'KeyW' || e.code === 'ArrowUp') keys.forward = true;
            if (e.code === 'KeyS' || e.code === 'ArrowDown') keys.backward = true;
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.left = false;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = false;
            if (e.code === 'Space') keys.jump = false;
            
            if (e.code === 'KeyW' || e.code === 'ArrowUp') keys.forward = false;
            if (e.code === 'KeyS' || e.code === 'ArrowDown') keys.backward = false;
        });

        // ==========================================
        // МОБИЛЬНЫЙ СИНИЙ ДЖОЙСТИК
        // ==========================================
        joystickZone.addEventListener('touchstart', (e) => {
            joystickActive = true;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        });

        joystickZone.addEventListener('touchmove', (e) => {
            if (!joystickActive) return;
            const diffX = e.touches[0].clientX - startX;
            const diffY = e.touches[0].clientY - startY;
            const maxDist = 35;
            
            const dist = Math.sqrt(diffX*diffX + diffY*diffY);
            let moveX = diffX;
            let moveY = diffY;

            if (dist > maxDist) {
                moveX = (diffX / dist) * maxDist;
                moveY = (diffY / dist) * maxDist;
            }

            stick.style.transform = `translate(${moveX}px, ${moveY}px)`;

            if (currentGameMode === 'cube') {
                if (moveX > 8) { keys.right = true; keys.left = false; }
                else if (moveX < -8) { keys.left = true; keys.right = false; }
                else { keys.left = false; keys.right = false; }
            } else if (currentGameMode === 'prison') {
                touchMoveX = moveX / maxDist;
                touchMoveZ = moveY / maxDist;
            }
        });

        joystickZone.addEventListener('touchend', () => {
            joystickActive = false;
            stick.style.transform = 'translate(0px, 0px)';
            keys.left = false; keys.right = false;
            touchMoveX = 0; touchMoveZ = 0;
        });

        jumpBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            keys.jump = true;
        });
        jumpBtn.addEventListener('touchend', () => { keys.jump = false; });

        // ==========================================
        // СИСТЕМА ROBLOX-ПОВОРОТА ГОЛОВЫ СВАЙПАМИ
        // ==========================================
        window.addEventListener('mousedown', (e) => {
            if (e.target.closest('#controls') || e.target.closest('.exit-door-btn') || !gameActive || currentGameMode !== 'prison') return;
            isRotating = true;
            previousMouseX = e.clientX;
            previousMouseY = e.clientY;
        });

        window.addEventListener('touchstart', (e) => {
            if (e.target.closest('#controls') || e.target.closest('.exit-door-btn') || !gameActive || currentGameMode !== 'prison') return;
            isRotating = true;
            previousMouseX = e.touches[0].clientX;
            previousMouseY = e.touches[0].clientY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isRotating) return;
            const deltaX = e.clientX - previousMouseX;
            const deltaY = e.clientY - previousMouseY;

            cameraYaw -= deltaX * 0.005;   
            cameraPitch -= deltaY * 0.005; 

            // Ограничение взгляда (чтобы нельзя было вывернуть голову назад)
            cameraPitch = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, cameraPitch));

            previousMouseX = e.clientX;
            previousMouseY = e.clientY;
        });

        window.addEventListener('touchmove', (e) => {
            if (!isRotating) return;
            if (e.target.closest('#joystickZone')) return; // Джойстик не должен крутить камеру

            const deltaX = e.touches[0].clientX - previousMouseX;
            const deltaY = e.touches[0].clientY - previousMouseY;

            cameraYaw -= deltaX * 0.008;   
            cameraPitch -= deltaY * 0.008;

            cameraPitch = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, cameraPitch));

            previousMouseX = e.touches[0].clientX;
            previousMouseY = e.touches[0].clientY;
        });

        window.addEventListener('mouseup', () => isRotating = false);
        window.addEventListener('touchend', () => isRotating = false);

        // ==========================================
        // ГЛАВНЫЙ ИГРОВОЙ ЦИКЛ
        // ==========================================
        function masterLoop() {
            if (!gameActive) return;

            if (currentGameMode === 'cube') {
                updateCubeGame();
                drawCubeGame();
            } else if (currentGameMode === 'prison') {
                updatePrisonGame();
                renderer3D.render(scene3D, camera3D);
            }

            loopId = requestAnimationFrame(masterLoop);
        }

        startGameBtn.addEventListener('click', () => {
            lobbyScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            currentGameMode = 'cube';
            gameActive = true;
            initCubeGame();
            masterLoop();
        });

        startPrisonBtn.addEventListener('click', () => {
            lobbyScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            currentGameMode = 'prison';
            gameActive = true;
            initPrisonGame();
            masterLoop();
        });

        exitDoorBtn.addEventListener('click', () => {
            gameActive = false;
            cancelAnimationFrame(loopId);
            gameScreen.style.display = 'none';
            lobbyScreen.style.display = 'flex';
            canvasContainer.innerHTML = ''; 
            
            for (let k in keys) keys[k] = false;
            joystickActive = false;
            isRotating = false;
            stick.style.transform = 'translate(0px, 0px)';
        });
    </script>
</body>
</html>
