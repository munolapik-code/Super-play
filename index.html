
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Паркур - Super play</title>
    <!-- Иконки для кнопок (дверь, play) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #191B1D; /* Оригинальный темный цвет Roblox */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #FFFFFF;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- 1. СТРАНИЦА ИГРЫ В СТИЛЕ ROBLOX --- */
        #roblox-menu {
            display: flex;
            flex-direction: column;
            width: 100%;
            min-height: 100%;
            background-color: #191B1D;
        }

        /* Верхняя шапка сайта */
        .roblox-navbar {
            height: 50px;
            background-color: #232527;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid #393B3D;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .roblox-navbar span {
            color: #0084FF;
            margin-right: 5px;
        }

        /* Главный блок страницы плейса */
        .place-container {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Большая обложка игры вверху страницы */
        .place-banner {
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, #2E3033 0%, #0f1011 100%);
            border-radius: 8px;
            border: 1px solid #393B3D;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Стилизованный кубик на обложке */
        .banner-cube {
            width: 60px;
            height: 60px;
            background-color: #FF5733;
            border-radius: 6px;
            box-shadow: 0 10px 25px rgba(255, 87, 51, 0.5);
            position: relative;
        }
        .banner-cube::after {
            content: '';
            position: absolute;
            top: 15px;
            right: 10px;
            width: 12px;
            height: 12px;
            background-color: white;
            border-radius: 3px;
        }

        /* Блок управления под обложкой: Название слева, Кнопка Play справа */
        .place-main-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #232527;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #393B3D;
        }

        .place-title {
            font-size: 32px;
            font-weight: 700;
            margin: 0;
        }

        /* Знаменитая зелёная кнопка Play из Roblox */
        .roblox-play-btn {
            background-color: #00B06F; /* Фирменный зеленый цвет Roblox */
            color: #FFFFFF;
            border: none;
            width: 70px;
            height: 70px;
            border-radius: 12px;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(0, 176, 111, 0.3);
            transition: background-color 0.1s, transform 0.1s;
        }

        .roblox-play-btn:hover {
            background-color: #009E63;
            transform: scale(1.03);
        }

        .roblox-play-btn:active {
            background-color: #008C57;
            transform: scale(0.98);
        }

        /* Описание игры внизу страницы */
        .place-description {
            background-color: #232527;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #393B3D;
            line-height: 1.6;
        }
        .place-description h3 {
            margin-top: 0;
            color: #B8B8B8;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- 2. ИГРОВОЙ ЭКРАН --- */
        #game-screen {
            display: none; /* Скрыт, пока не нажмут Play */
            width: 100%;
            height: 100%;
            position: relative;
        }

        canvas {
            display: block;
            background-color: #87CEEB; /* Небо */
            width: 100%;
            height: 100%;
        }

        /* Кнопка-дверька для выхода в углу экрана */
        .exit-door-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background-color: rgba(35, 37, 39, 0.85);
            border: 2px solid #393B3D;
            border-radius: 10px;
            color: #FF4A4A;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            font-size: 22px;
            transition: background-color 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .exit-door-btn:hover {
            background-color: #232527;
        }

        /* Джойстик и прыжок для сенсора */
        #controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            z-index: 10;
            pointer-events: none;
        }
        .joystick-zone, .jump-btn {
            pointer-events: auto;
        }

        .joystick-zone {
            width: 110px;
            height: 110px;
            background: rgba(35, 37, 39, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            position: relative;
            touch-action: none;
        }
        .joystick-stick {
            width: 45px;
            height: 45px;
            background: #FFFFFF;
            border-radius: 50%;
            position: absolute;
            top: 30px;
            left: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .jump-btn {
            width: 85px;
            height: 85px;
            background: rgba(0, 132, 255, 0.7);
            border: 2px solid #FFFFFF;
            border-radius: 50%;
            color: white;
            font-weight: 800;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <!-- ================= 1. СТРАНИЦА ИГРЫ ROBLOX ================= -->
    <div id="roblox-menu">
        <div class="roblox-navbar">
            <span>Super</span> play
        </div>

        <div class="place-container">
            <!-- Обложка игры -->
            <div class="place-banner">
                <div class="banner-cube"></div>
            </div>

            <!-- Главная панель: Название и Кнопка запуск справа -->
            <div class="place-main-info">
                <h1 class="place-title">Паркур</h1>
                <button class="roblox-play-btn" id="playBtn" title="Играть">
                    <i class="fa-solid fa-play"></i>
                </button>
            </div>

            <!-- Описание -->
            <div class="place-description">
                <h3>Описание</h3>
                Добро пожаловать в Паркур на платформе Super play! Управляйте персонажем-кубиком, прыгайте по опасным платформам и пройдите всю длинную карту. Игра поддерживает клавиатуру на ПК и сенсорный джойстик на мобильных устройствах.
            </div>
        </div>
    </div>

    <!-- ================= 2. ЭКРАН САМОЙ ИГРЫ ================= -->
    <div id="game-screen">
        <!-- Кнопка Дверька для выхода -->
        <div class="exit-door-btn" id="exitDoorBtn" title="Выйти на главную">
            <i class="fa-solid fa-door-open"></i>
        </div>

        <canvas id="gameCanvas"></canvas>

        <!-- Сенсорное управление -->
        <div id="controls">
            <div class="joystick-zone" id="joystickZone">
                <div class="joystick-stick" id="stick"></div>
            </div>
            <div class="jump-btn" id="jumpBtn">ПРЫЖОК</div>
        </div>
    </div>

    <!-- ================= ИГРОВОЙ КОД ================= -->
    <script>
        const robloxMenu = document.getElementById('roblox-menu');
        const gameScreen = document.getElementById('game-screen');
        const playBtn = document.getElementById('playBtn');
        const exitDoorBtn = document.getElementById('exitDoorBtn');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let gameActive = false;
        let loopId = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', () => {
            if (gameActive) resizeCanvas();
        });

        // Физика игры
        const gravity = 0.6;
        const player = {
            x: 100,
            y: 0,
            width: 40,
            height: 40,
            vx: 0,
            vy: 0,
            speed: 5.5,
            jumpForce: 13,
            grounded: false
        };

        const camera = { x: 0 };
        let platforms = [];

        function initLevel() {
            const groundY = canvas.height - 100;
            player.x = 100;
            player.y = groundY - 100;
            player.vx = 0;
            player.vy = 0;
            camera.x = 0;

            platforms = [
                { x: 0, y: groundY, width: 5000, height: 100, color: '#2ed573' }, 
                { x: 450, y: groundY - 120, width: 130, height: 20, color: '#ffa502' },
                { x: 720, y: groundY - 220, width: 130, height: 20, color: '#ff6b81' },
                { x: 980, y: groundY - 160, width: 180, height: 20, color: '#ffa502' },
                { x: 1300, y: groundY - 250, width: 130, height: 20, color: '#1e90ff' },
                { x: 1600, y: groundY - 150, width: 120, height: 20, color: '#ffa502' },
                { x: 1850, y: groundY - 260, width: 100, height: 20, color: '#ff6b81' },
                { x: 2120, y: groundY - 180, width: 180, height: 20, color: '#ffa502' },
                { x: 2450, y: groundY - 120, width: 300, height: 20, color: '#2ed573' }
            ];
        }

        const keys = { left: false, right: false, jump: false };

        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.left = true;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = true;
            if (e.code === 'Space' || e.code === 'KeyW' || e.code === 'ArrowUp') keys.jump = true;
        });

        window.addEventListener('keyup', (e) => {
            if (!gameActive) return;
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.left = false;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = false;
            if (e.code === 'Space' || e.code === 'KeyW' || e.code === 'ArrowUp') keys.jump = false;
        });

        // Сенсорный джойстик
        const joystickZone = document.getElementById('joystickZone');
        const stick = document.getElementById('stick');
        let joystickActive = false;
        let startX = 0;

        joystickZone.addEventListener('touchstart', (e) => {
            joystickActive = true;
            startX = e.touches[0].clientX;
        });

        joystickZone.addEventListener('touchmove', (e) => {
            if (!joystickActive) return;
            const diffX = e.touches[0].clientX - startX;
            let maxDist = 30;
            let moveX = Math.max(-maxDist, Math.min(maxDist, diffX));
            stick.style.transform = `translateX(${moveX}px)`;

            if (moveX > 8) { keys.right = true; keys.left = false; }
            else if (moveX < -8) { keys.left = true; keys.right = false; }
            else { keys.left = false; keys.right = false; }
        });

        joystickZone.addEventListener('touchend', () => {
            joystickActive = false;
            stick.style.transform = 'translateX(0px)';
            keys.left = false;
            keys.right = false;
        });

        const jumpBtn = document.getElementById('jumpBtn');
        jumpBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            keys.jump = true;
        });
        jumpBtn.addEventListener('touchend', () => { keys.jump = false; });

        function update() {
            if (keys.left) player.vx = -player.speed;
            else if (keys.right) player.vx = player.speed;
            else player.vx = 0;

            player.vy += gravity;
            player.x += player.vx;
            player.y += player.vy;

            if (player.y > canvas.height + 150) {
                player.x = 100;
                player.y = canvas.height - 250;
                player.vy = 0;
            }

            player.grounded = false;
            for (let plat of platforms) {
                if (player.x + player.width > plat.x && player.x < plat.x + plat.width &&
                    player.y + player.height >= plat.y && player.y + player.height - player.vy <= plat.y) {
                    player.y = plat.y - player.height;
                    player.vy = 0;
                    player.grounded = true;
                }
            }

            if (keys.jump && player.grounded) {
                player.vy = -player.jumpForce;
                player.grounded = false;
            }

            camera.x = player.x - canvas.width / 3;
            if (camera.x < 0) camera.x = 0;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(-camera.x, 0);

            for (let plat of platforms) {
                ctx.fillStyle = plat.color;
                ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
            }

            ctx.fillStyle = '#FF5733';
            ctx.fillRect(player.x, player.y, player.width, player.height);

            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(player.x + (player.vx >= 0 ? 25 : 5), player.y + 10, 10, 10);
            ctx.fillStyle = '#000000';
            ctx.fillRect(player.x + (player.vx >= 0 ? 30 : 5), player.y + 12, 5, 5);

            ctx.restore();
        }

        function gameLoop() {
            if (!gameActive) return;
            update();
            draw();
            loopId = requestAnimationFrame(gameLoop);
        }

        // Переключение режимов
        playBtn.addEventListener('click', () => {
            robloxMenu.style.display = 'none';
            gameScreen.style.display = 'block';
            gameActive = true;
            resizeCanvas();
            initLevel();
            gameLoop();
        });

        exitDoorBtn.addEventListener('click', () => {
            gameActive = false;
            cancelAnimationFrame(loopId);
            gameScreen.style.display = 'none';
            robloxMenu.style.display = 'flex';
            keys.left = false; keys.right = false; keys.jump = false;
        });
    </script>
</body>
</html>
